<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Χτίζω Πρόταση</title>
  <style>
    :root {
      --ink: #182230;
      --muted: #5d6b7a;
      --page: #f6f8fc;
      --panel: #ffffff;
      --line: #dbe3ef;
      --shadow: 0 18px 48px rgba(24, 34, 48, 0.14);
      --subject: #ef476f;
      --verb: #f59e0b;
      --object: #06a77d;
      --place: #118ab2;
      --reason: #7c3aed;
      --violet: #7c3aed;
      --good: #0f9f6e;
      --bad: #d92d20;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(17, 138, 178, 0.09), rgba(255, 255, 255, 0) 320px),
        var(--page);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mode-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: #ffffff;
      border: 2px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-right: 8px;
      flex: 0 0 auto;
    }

    .mode-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--ink);
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      background: var(--violet);
      color: #ffffff;
    }

    .mode-btn:hover:not(.active) {
      background: rgba(124, 58, 237, 0.1);
    }

    .brand-mark {
      display: grid;
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
      place-items: center;
      border: 3px solid #ffffff;
      border-radius: 18px;
      background: var(--violet);
      color: #ffffff;
      box-shadow: var(--shadow);
      font-size: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.35;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      min-width: 80px;
      min-height: 80px;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 18px;
      color: #ffffff;
      background: var(--ink);
      box-shadow: 0 10px 28px rgba(24, 34, 48, 0.18);
      cursor: pointer;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 6px 20px rgba(24, 34, 48, 0.18);
    }

    .btn.new {
      background: var(--violet);
    }

    .btn.listen {
      background: var(--place);
    }

    .btn.clear {
      background: #475467;
    }

    .board {
      display: grid;
      gap: 16px;
    }

    .slots {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .slots.mode-5 {
      gap: 10px;
    }

    .slot-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(24, 34, 48, 0.08);
    }

    .slot-head {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .slot-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 900;
      line-height: 1.1;
    }

    .slot-title strong {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
    }

    .slot-number {
      display: inline-grid;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 950;
    }

    .slot-role {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.25;
    }

    .slot-drop {
      display: grid;
      min-height: 168px;
      place-items: center;
      border: 3px dashed var(--line);
      border-radius: 16px;
      background: #f9fbff;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .slot-drop.ready {
      background: #ffffff;
      border-color: var(--violet);
      transform: translateY(-2px);
    }

    .slot-drop.hovered {
      background: #ecfdf7;
      border-color: var(--good);
      transform: translateY(-3px) scale(1.01);
    }

    .slot-drop.wrong {
      border-color: var(--bad);
      background: #fff4f2;
    }

    .slot-drop.filled {
      border-style: solid;
      background: #ffffff;
    }

    .slot-empty {
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 16px;
      font-size: 1.03rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .slot-empty-icon {
      font-size: 2.15rem;
    }

    .slot-item {
      display: grid;
      width: 100%;
      min-height: 148px;
      place-items: center;
      gap: 6px;
      padding: 12px;
      border-radius: 14px;
      background: #ffffff;
      color: var(--ink);
    }

    .slot-item .emoji {
      font-size: clamp(3rem, 10vw, 4.4rem);
    }

    .slot-item .word {
      font-size: clamp(1.05rem, 3.5vw, 1.35rem);
    }

    .emoji {
      font-size: clamp(4rem, 14vw, 5.9rem);
      line-height: 1;
    }

    .emoji.custom-image {
      display: block;
      width: clamp(4rem, 14vw, 5.9rem);
      height: clamp(4rem, 14vw, 5.9rem);
      object-fit: contain;
      border-radius: 18px;
    }

    .slot-item .emoji.custom-image {
      width: clamp(3rem, 10vw, 4.4rem);
      height: clamp(3rem, 10vw, 4.4rem);
    }

    .word {
      overflow-wrap: anywhere;
      font-size: clamp(1.25rem, 4.4vw, 1.7rem);
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
    }

    .slot-action {
      min-height: 80px;
      border: 0;
      border-radius: 16px;
      color: #ffffff;
      cursor: pointer;
      font-size: 1.02rem;
      font-weight: 900;
      transition: transform 160ms ease, filter 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .slot-action:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .tray,
    .sentence-panel {
      padding: 14px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(24, 34, 48, 0.08);
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: clamp(1.15rem, 3.2vw, 1.45rem);
      font-weight: 950;
      line-height: 1.15;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      min-height: 150px;
    }

    .word-card {
      display: grid;
      min-width: 80px;
      min-height: 148px;
      place-items: center;
      gap: 6px;
      padding: 12px;
      border: 3px solid transparent;
      border-radius: 18px;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(24, 34, 48, 0.13);
      cursor: grab;
      touch-action: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .word-card:active {
      cursor: grabbing;
    }

    .word-card:hover,
    .word-card.selected {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(24, 34, 48, 0.18);
    }

    .word-card.selected {
      border-color: var(--violet);
    }

    .word-card.drag-source {
      opacity: 0.24;
    }

    .drag-clone {
      position: fixed;
      z-index: 1000;
      width: min(176px, 44vw);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.03);
      box-shadow: 0 22px 48px rgba(24, 34, 48, 0.24);
    }

    body.dragging-touch {
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .empty-tray {
      display: grid;
      min-height: 148px;
      place-items: center;
      color: var(--good);
      font-size: 1.25rem;
      font-weight: 950;
      text-align: center;
    }

    .sentence-panel {
      display: grid;
      gap: 12px;
      margin-bottom: max(18px, env(safe-area-inset-bottom));
    }

    .sentence-text {
      margin: 0;
      padding: 16px;
      border-radius: 18px;
      background: #182230;
      color: #ffffff;
      font-size: clamp(1.9rem, 7.4vw, 3.1rem);
      font-weight: 950;
      line-height: 1.14;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .built-text {
      min-height: 48px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1.15rem, 3.5vw, 1.45rem);
      font-weight: 850;
      line-height: 1.3;
      text-align: center;
    }

    .feedback {
      min-height: 34px;
      margin: 0;
      color: var(--violet);
      font-size: 1.05rem;
      font-weight: 900;
      line-height: 1.25;
      text-align: center;
    }

    .feedback.good {
      color: var(--good);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .legend.mode-5 {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .legend-chip {
      min-height: 40px;
      border-radius: 999px;
      color: #ffffff;
      display: grid;
      place-items: center;
      padding: 6px 8px;
      font-size: 0.78rem;
      font-weight: 950;
      text-align: center;
      line-height: 1.05;
    }

    @media (min-width: 560px) {
      .app {
        padding: 22px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .slots {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (min-width: 920px) {
      .slots {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .slots.mode-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .slot-drop {
        min-height: 188px;
      }

      .word-card {
        min-height: 168px;
      }
    }

    @media (min-width: 760px) {
      .slots.mode-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .slots.mode-5 .slot-card {
        gap: 7px;
        padding: 8px;
      }

      .slots.mode-5 .slot-title strong {
        gap: 6px;
        font-size: 0.92rem;
      }

      .slots.mode-5 .slot-number {
        width: 28px;
        height: 28px;
        font-size: 0.86rem;
      }

      .slots.mode-5 .slot-role {
        font-size: 0.82rem;
      }

      .slots.mode-5 .slot-drop {
        min-height: 112px;
        border-width: 2px;
        border-radius: 13px;
      }

      .slots.mode-5 .slot-empty {
        gap: 5px;
        padding: 10px 6px;
        font-size: 0.82rem;
      }

      .slots.mode-5 .slot-empty-icon {
        font-size: 1.65rem;
      }

      .slots.mode-5 .slot-item {
        min-height: 102px;
        gap: 4px;
        padding: 8px 6px;
      }

      .slots.mode-5 .slot-item .emoji {
        font-size: clamp(2.6rem, 5vw, 3.4rem);
      }

      .slots.mode-5 .slot-item .emoji.custom-image {
        width: clamp(2.6rem, 5vw, 3.4rem);
        height: clamp(2.6rem, 5vw, 3.4rem);
      }

      .slots.mode-5 .slot-item .word {
        font-size: clamp(0.9rem, 1.75vw, 1.08rem);
        line-height: 1.04;
      }

      .slots.mode-5 .slot-action {
        min-height: 56px;
        border-radius: 13px;
        font-size: 0.86rem;
      }

      .card-grid.mode-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .card-grid.mode-5 .word-card {
        min-height: 124px;
        padding: 9px 6px;
      }

      .card-grid.mode-5 .word-card .emoji {
        font-size: clamp(3rem, 5.6vw, 4rem);
      }

      .card-grid.mode-5 .word-card .emoji.custom-image {
        width: clamp(3rem, 5.6vw, 4rem);
        height: clamp(3rem, 5.6vw, 4rem);
      }

      .card-grid.mode-5 .word-card .word {
        font-size: clamp(0.98rem, 2vw, 1.18rem);
        line-height: 1.05;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

    }

    function isHumanSubject(subject) {
      return Boolean(subject?.groups?.includes("human"));
    }

    function isAllowedSeeReason(subject, object, place, reasonId) {
      if (isAnimalSubject(subject)) return false;
      if (["wantsShow", "wantsRemember"].includes(reasonId)) return false;
      if (["carefulLook", "prettyThing"].includes(reasonId)) return true;
      if (reasonId === "wantsLearn") {
        return isHumanSubject(subject) && SEE_LEARNING_PLACES.includes(place.id) && SEE_LEARNING_OBJECTS.includes(object.id);
      }
      return false;
    }

    function isAllowedCollectReason(object, place, reasonId) {
      if (reasonId === "fun") return false;
      if (reasonId === "playing") return COLLECT_PLAY_OBJECTS.includes(object.id);
      if (reasonId === "plantCare") return COLLECT_PLANT_OBJECTS.includes(object.id);
      if (reasonId === "guests") return COLLECT_TABLE_OBJECTS.includes(object.id);
      if (reasonId === "needsClean") return COLLECT_CLEAN_OBJECTS.includes(object.id);
      if (reasonId === "farmWork") return place.id === "farm" && COLLECT_FARM_OBJECTS.includes(object.id);
      return reasonId === "needsHelp";
    }

    function isAllowedTableReadyReason(verb, object, reasonId) {
      if (reasonId !== "tableReady") return true;
      if (["give", "take", "collect"].includes(verb.id)) return TABLE_READY_OBJECTS.includes(object.id);
      if (verb.id === "fill") return ["glass", "plate"].includes(object.id);
      return false;
    }

    function isReasonAllowedForContext(sentence, reasonId) {
      const { subject, verb, object, place } = sentence;
      if (!subject || !verb || !object || !place) return false;

      if (isAnimalSubject(subject)) {
        if (ANIMAL_BLOCKED_REASONS.includes(reasonId)) return false;
        if (!ANIMAL_BASIC_REASONS.includes(reasonId)) return false;
      }

      if (verb.id === "see") return isAllowedSeeReason(subject, object, place, reasonId);

      if (reasonId === "wantsShow") {
        return isHumanSubject(subject) && WANTS_SHOW_VERBS.includes(verb.id);
      }

      if (reasonId === "wantsRemember") {
        if (!isHumanSubject(subject)) return false;
        if (WANTS_REMEMBER_VERBS.includes(verb.id)) return true;
        return verb.id === "read" && ["book", "letter"].includes(object.id);
      }

      if (verb.id === "cut") {
        return ["mealTime", "hungry", "guests", "birthday", "cookingNeed"].includes(reasonId);
      }

      if (verb.id === "collect") {
        return isAllowedCollectReason(object, place, reasonId);
      }

      if (reasonId === "fun") {
        return FUN_VERBS.includes(verb.id);
      }

      return isAllowedTableReadyReason(verb, object, reasonId);
    }

    function allowedReasonIdsFor(sentence) {
      const { verb } = sentence;
      if (!verb) return [];
      const allowed = new Set(defaultReasonIdsByVerb[verb.id] || verb.reasons || ["happy"]);
      reasonRules.forEach((rule) => {
        if (matchesReasonRule(rule, sentence)) {
          rule.reasons.forEach((reasonId) => allowed.add(reasonId));
        }
      });
      return [...allowed].filter((reasonId) => reasonIdSet.has(reasonId) && isReasonAllowedForContext(sentence, reasonId));
    }

    function allowedReasonsFor(sentence) {
      const allowedIds = new Set(allowedReasonIdsFor(sentence));
      return reasons.filter((reason) => allowedIds.has(reason.id));
    }

    function passesMode4SemanticDetails(subject, verb, object, place) {
      const hasMode4Rule = Boolean(mode4RuleFor(verb));

      if (subject.id === "fish") {
        if (!["sea", "lake", "pool"].includes(place.id)) return false;
        if (!["eat", "drink", "see"].includes(verb.id)) return false;
        if (verb.id === "eat") return object.id === "bread";
        if (verb.id === "see") return ["bread", "water"].includes(object.id);
        if (verb.id === "drink") return object.id === "water";
        return false;
      }

      if (subject.groups.includes("insect")) {
        if (!insectPlaces.includes(place.id)) return false;
        if (!["search", "see"].includes(verb.id)) return false;
        if (verb.id === "search") return object.id === "flower";
        if (verb.id === "see") return ["flower", "tree"].includes(object.id);
        return false;
      }

      if (!hasMode4Rule && verb.id === "drink") {
        if (subject.groups.includes("human")) return true;
        if (["dog", "cat"].includes(subject.id)) return ["water", "milk"].includes(object.id);
        return object.id === "water";
      }

      if (!hasMode4Rule && verb.id === "eat" && subject.groups.includes("animal")) {
        if (subject.groups.includes("wild")) return ["apple", "bread"].includes(object.id);
        if (subject.groups.includes("farm")) return ["apple", "bread", "carrot"].includes(object.id);
        return ["apple", "banana", "bread"].includes(object.id);
      }

      if (verb.id === "touch" && object.id === "tree" && ["dog", "cat", "mouse", "rabbit"].includes(subject.id)) {
        return ["park", "garden", "forest"].includes(place.id);
      }

      if (verb.id === "see" && subject.groups.includes("wild") && ["apple", "bread"].includes(object.id) && subject.places.includes(place.id)) {
        return true;
      }

      const placeLimits = semanticPlaceLimits[verb.id];
      if (placeLimits) {
        const allowedPlacesForObject = placeLimits[object.id];
        if (!allowedPlacesForObject || !allowedPlacesForObject.includes(place.id)) return false;
      }

      if (!hasMode4Rule && verb.id === "find" && subject.groups.includes("animal") && !["ball", "toy"].includes(object.id)) {
        return false;
      }

      if (verb.id === "see" && subject.groups.includes("animal") && object.id === "star") {
        return ["park", "garden", "forest", "zoo", "beach", "mountain", "lake", "farm", "yard"].includes(place.id);
      }

      return true;
    }

    function isAllowedMode5(sentence) {
      const { subject, verb, object, place, reason } = sentence;
      if (!subject || !verb || !object || !place || !reason) return false;
      if (!subject.places.includes(place.id)) return false;
      if (!isMode4Meaningful(subject, verb, object, place)) return false;
      if (!passesMode4SemanticDetails(subject, verb, object, place)) return false;
      return allowedReasonIdsFor({ subject, verb, object, place }).includes(reason.id);
    }

    function isMeaningful(sentence) {
      const { subject, verb, object, place, reason } = sentence;
      if (!subject || !verb || !place) return false;
      if (!verb.active) return false;

      const requiresObject = state.mode >= 4;
      const requiresReason = state.mode === 5;

      if (!requiresObject) {
        if (!hasGroup(subject, verb.subjectGroups)) return false;
        if (!subject.places.includes(place.id)) return false;
        return isMode3Meaningful(subject, verb, place);
      }

      if (!object) return false;
      if (!subject.places.includes(place.id)) return false;
      if (!isMode4Meaningful(subject, verb, object, place)) return false;
      if (!passesMode4SemanticDetails(subject, verb, object, place)) return false;

      if (requiresReason) {
        return isAllowedMode5(sentence);
      }

      return true;
    }

    function candidatesFor(key, sentence) {
      const lists = { subject: subjects, verb: verbs.filter((verb) => verb.active), object: objects, place: places, reason: reasons };
      if (!lists[key]) return [];
      if (key === "reason") {
        return allowedReasonsFor(sentence).filter((candidate) => !sentence.reason || candidate.id !== sentence.reason.id);
      }
      return lists[key].filter((candidate) => {
        if (sentence[key] && candidate.id === sentence[key].id) return false;
        return isMeaningful(sentenceWith(sentence, key, candidate));
      });
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function shuffle(items) {
      const next = [...items];
      for (let index = next.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
      }
      return next;
    }

    function makeSentenceText(sentence) {
      if (!sentence) return "";
      const parts = activeKeys().map((key) => sentence[key]?.text).filter(Boolean);
      return `${parts.join(" ")}.`;
    }

    function makeBuiltSentenceText() {
      const pieces = activeKeys().map((key) => {
        const cardId = state.slots[key];
        const card = state.cards.find((item) => item.cardId === cardId);
        return card ? card.item.text : "___";
      });
      const isComplete = pieces.every((piece) => piece !== "___");
      return `${pieces.join(" ")}${isComplete ? "." : ""}`;
    }

    function refreshVoices() {
      if (!("speechSynthesis" in window)) return [];
      cachedVoices = window.speechSynthesis.getVoices();
      return cachedVoices;
    }

    function voiceScore(voice) {
      const name = voice.name.toLowerCase();
      const lang = voice.lang.toLowerCase();
      if (!lang.startsWith("el")) return -1000;

      let score = lang === "el-gr" ? 40 : 25;
      if (name.includes("google")) score += 22;
      if (name.includes("microsoft")) score += 22;
      if (name.includes("apple")) score += 18;
      if (name.includes("natural") || name.includes("neural") || name.includes("premium") || name.includes("enhanced")) score += 18;
      if (name.includes("melina") || name.includes("athina") || name.includes("nikos")) score += 12;
      if (!voice.localService) score += 4;
      return score;
    }

    function bestGreekVoice() {
      const voices = refreshVoices();
      return voices
        .filter((voice) => voiceScore(voice) > 0)
        .sort((a, b) => voiceScore(b) - voiceScore(a))[0] || null;
    }

    function getSentencesForSubject(subject) {
      const cacheKey = `${state.mode}:${subject.id}`;
      if (sentencePoolBySubject.has(cacheKey)) return sentencePoolBySubject.get(cacheKey);

      const activeVerbs = verbs.filter((verb) => verb.active);
      const options = [];
      for (const verb of activeVerbs) {
        if (!isSubjectAllowedForVerb(subject, verb)) continue;
        const objectsToTry = state.mode >= 4 ? idsToItems(objects, objectIdsForVerb(verb)) : [null];
        const placesToTry = idsToItems(places, placeIdsForVerb(verb))
          .filter((place) => place && subject.places.includes(place.id));
        for (const object of objectsToTry) {
          for (const place of placesToTry) {
            const reasonsToTry = state.mode === 5 ? allowedReasonsFor({ subject, verb, object, place }) : [null];
            for (const reason of reasonsToTry) {
              const sentence = { subject, verb, place };
              if (object) sentence.object = object;
              if (reason) sentence.reason = reason;
              if (!isMeaningful(sentence)) continue;
              if (requiredAlternativeKeys().every((key) => candidatesFor(key, sentence).length > 0)) {
                options.push(sentence);
              }
            }
          }
        }
      }

      sentencePoolBySubject.set(cacheKey, options);
      return options;
    }

    function buildSentence() {
      for (const subject of shuffle(subjects)) {
        const options = getSentencesForSubject(subject);
        if (options.length) {
          return randomItem(options);
        }
      }

      const fallback = {
        subject: itemById(subjects, "boy"),
        verb: itemById(verbs, "eat"),
        place: itemById(places, "home")
      };
      if (state.mode >= 4) fallback.object = itemById(objects, "apple");
      if (state.mode === 5) fallback.reason = itemById(reasons, "hungry");
      return fallback;
    }

    function createCards(sentence) {
      return shuffle(activeKeys().map((key) => ({
        cardId: `${key}-${Math.random().toString(36).slice(2)}`,
        category: key,
        item: sentence[key],
        placed: false
      })));
    }

    function newSentence() {
      state.target = buildSentence();
      state.cards = createCards(state.target);
      state.slots = emptySlots();
      state.selectedCardId = null;
      state.feedback = "Σύρε ή πάτησε μία κάρτα και βάλε τη στο σωστό πλαίσιο.";
      state.feedbackType = "";
      state.wrongSlot = null;
      render();
    }

    function changeMode(newMode) {
      if (![3, 4, 5].includes(newMode)) return;
      if (newMode === state.mode) return;
      state.mode = newMode;
      newSentence();
    }

    function clearSlots() {
      state.cards = state.cards.map((card) => ({ ...card, placed: false }));
      state.slots = emptySlots();
      state.selectedCardId = null;
      state.feedback = "Τα πλαίσια άδειασαν.";
      state.feedbackType = "";
      state.wrongSlot = null;
      render();
    }

    function changePart(key) {
      const alternatives = candidatesFor(key, state.target);
      if (!alternatives.length) {
        state.feedback = "Δεν υπάρχει άλλη λογική επιλογή με τα ίδια στοιχεία.";
        state.feedbackType = "bad";
        render();
        return;
      }

      const nextItem = randomItem(alternatives);
      state.target = sentenceWith(state.target, key, nextItem);
      state.cards = state.cards.map((card) => card.category === key ? { ...card, item: nextItem } : card);
      state.feedback = `Άλλαξε το ${categories.find((category) => category.key === key).label}.`;
      state.feedbackType = "";
      state.wrongSlot = null;
      render();
    }

    function placeCard(cardId, slotKey) {
      const card = state.cards.find((item) => item.cardId === cardId);
      if (!card) return;

      if (card.category !== slotKey) {
        state.feedback = `Δοκίμασε στο πλαίσιο «${categories.find((category) => category.key === card.category).label}».`;
        state.feedbackType = "bad";
        state.wrongSlot = slotKey;
        render();
        window.setTimeout(() => {
          if (state.wrongSlot === slotKey) {
            state.wrongSlot = null;
            render();
          }
        }, 450);
        return;
      }

      const existingCardId = state.slots[slotKey];
      state.cards = state.cards.map((item) => {
        if (item.cardId === cardId) return { ...item, placed: true };
        if (item.cardId === existingCardId) return { ...item, placed: false };
        return item;
      });
      state.slots[slotKey] = cardId;
      state.selectedCardId = null;
      state.wrongSlot = null;

      if (activeKeys().every((key) => state.slots[key])) {
        state.feedback = "Μπράβο! Η πρόταση είναι έτοιμη.";
        state.feedbackType = "good";
      } else {
        state.feedback = "Ωραία, συνέχισε.";
        state.feedbackType = "";
      }
      render();
    }

    function removeFromSlot(slotKey) {
      const cardId = state.slots[slotKey];
      if (!cardId) return;
      state.cards = state.cards.map((card) => card.cardId === cardId ? { ...card, placed: false } : card);
      state.slots[slotKey] = null;
      state.feedback = "Η κάρτα γύρισε κάτω.";
      state.feedbackType = "";
      render();
    }

    function toggleSelected(cardId) {
      state.selectedCardId = state.selectedCardId === cardId ? null : cardId;
      state.feedback = state.selectedCardId ? "Πάτησε τώρα το σωστό πλαίσιο." : "Η επιλογή ακυρώθηκε.";
      state.feedbackType = "";
      state.wrongSlot = null;
      render();
    }

    function speakSentence() {
      const text = makeSentenceText(state.target);
      if (!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) {
        state.feedback = "Η συσκευή δεν υποστηρίζει εκφώνηση.";
        state.feedbackType = "bad";
        render();
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "el-GR";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;
      const greekVoice = bestGreekVoice();
      if (greekVoice) utterance.voice = greekVoice;
      window.speechSynthesis.speak(utterance);
      window.speechSynthesis.resume();
      state.feedback = greekVoice ? "Άκουσε την πρόταση με ελληνική φωνή." : "Άκουσε την πρόταση.";
      state.feedbackType = "";
      render();
    }

    function visualHtml(item) {
      if (item.image) {
        return `<img class="emoji custom-image" src="${item.image}" alt="" aria-hidden="true" draggable="false">`;
      }
      return `<span class="emoji" aria-hidden="true">${item.emoji}</span>`;
    }

    function cardHtml(card) {
      const category = categories.find((item) => item.key === card.category);
      const selectedClass = card.cardId === state.selectedCardId ? " selected" : "";
      return `
        <button class="word-card${selectedClass}" type="button" data-card-id="${card.cardId}" aria-label="${category.label}: ${card.item.text}">
          ${visualHtml(card.item)}
          <span class="word">${card.item.text}</span>
        </button>
      `;
    }

    function slotHtml(category, index) {
      const cardId = state.slots[category.key];
      const card = state.cards.find((item) => item.cardId === cardId);
      const filledClass = card ? " filled" : "";
      const readyClass = state.selectedCardId ? " ready" : "";
      const wrongClass = state.wrongSlot === category.key ? " wrong" : "";
      const content = card ? `
        <button class="slot-item" type="button" data-remove-slot="${category.key}" aria-label="Αφαίρεση: ${card.item.text}">
          ${visualHtml(card.item)}
          <span class="word">${card.item.text}</span>
        </button>
      ` : `
        <div class="slot-empty">
          <span class="slot-empty-icon" aria-hidden="true">${category.icon}</span>
          <span>Βάλε εδώ την κάρτα</span>
        </div>
      `;

      return `
        <article class="slot-card">
          <div class="slot-head">
            <div class="slot-title">
              <strong><span class="slot-number" style="background:${category.color}">${index + 1}</span>${category.label}</strong>
            </div>
            <div class="slot-role">${category.role}</div>
          </div>
          <div class="slot-drop${filledClass}${readyClass}${wrongClass}" data-slot="${category.key}">
            ${content}
          </div>
          <button class="slot-action" type="button" data-change="${category.key}" style="background:${category.color}">
            🎲 Άλλο
          </button>
        </article>
      `;
    }

    function render() {
      const trayCards = state.cards.filter((card) => !card.placed);
      const trayHtml = trayCards.length
        ? trayCards.map(cardHtml).join("")
        : `<div class="empty-tray">Όλες οι κάρτες μπήκαν στα πλαίσια.</div>`;
      const builtSentence = makeBuiltSentenceText();
      const feedbackClass = state.feedbackType ? ` ${state.feedbackType}` : "";

      app.innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div class="mode-switch" role="group" aria-label="Αριθμός κομματιών πρότασης">
              ${[3, 4, 5].map((mode) => `
                <button type="button" class="mode-btn${state.mode === mode ? ' active' : ''}" data-mode="${mode}" aria-pressed="${state.mode === mode}">${mode}</button>
              `).join("")}
            </div>
            <div class="brand-mark" aria-hidden="true">🧩</div>
            <div>
              <h1>Χτίζω πρόταση</h1>
              <p class="subtitle">${activeCategories().map((category) => category.label).join(" · ")}</p>
            </div>
          </div>
          <div class="toolbar">
            <button class="btn new" type="button" data-new>🔄 Νέα πρόταση</button>
            <button class="btn listen" type="button" data-listen>🔊 Άκουσε</button>
          </div>
        </header>

        <section class="board" aria-label="Άσκηση πρότασης">
          <div class="legend mode-${state.mode}" aria-hidden="true">
            ${activeCategories().map((category) => `<span class="legend-chip" style="background:${category.color}">${category.label}</span>`).join("")}
          </div>

          <div class="slots mode-${state.mode}">
            ${activeCategories().map(slotHtml).join("")}
          </div>

          <section class="tray" aria-label="Κάρτες επιλογής">
            <h2 class="section-title">Κάρτες</h2>
            <div class="card-grid mode-${state.mode}">
              ${trayHtml}
            </div>
          </section>

          <section class="sentence-panel" aria-label="Πλήρης πρόταση">
            <h2 class="section-title">Πλήρης πρόταση</h2>
            <p class="sentence-text">${makeSentenceText(state.target)}</p>
            <p class="built-text">${builtSentence}</p>
            <p class="feedback${feedbackClass}">${state.feedback}</p>
            <button class="btn clear" type="button" data-clear>↩️ Άδειασε τα πλαίσια</button>
          </section>
        </section>
      `;

      bindEvents();
    }

    function bindEvents() {
      document.querySelector("[data-new]").addEventListener("click", newSentence);
      document.querySelector("[data-listen]").addEventListener("click", speakSentence);
      document.querySelector("[data-clear]").addEventListener("click", clearSlots);

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => changeMode(Number(button.dataset.mode)));
      });

      document.querySelectorAll("[data-change]").forEach((button) => {
        button.addEventListener("click", () => changePart(button.dataset.change));
      });

      document.querySelectorAll("[data-remove-slot]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeFromSlot(button.dataset.removeSlot);
        });
      });

      document.querySelectorAll("[data-slot]").forEach((slot) => {
        slot.addEventListener("click", () => {
          if (state.selectedCardId) placeCard(state.selectedCardId, slot.dataset.slot);
        });
      });

      document.querySelectorAll("[data-card-id]").forEach((card) => {
        if (window.PointerEvent) {
          card.addEventListener("pointerdown", startPointerDrag);
        } else {
          card.addEventListener("touchstart", startTouchDrag, { passive: false });
        }
      });
    }

    function beginDrag(card, pointerId, clientX, clientY, inputType) {
      const cardId = card.dataset.cardId;
      state.selectedCardId = null;
      dragState = {
        card,
        cardId,
        pointerId,
        inputType,
        startX: clientX,
        startY: clientY,
        clone: null,
        moved: false,
        activeSlot: null
      };
    }

    function startPointerDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const card = event.currentTarget;
      event.preventDefault();
      beginDrag(card, event.pointerId, event.clientX, event.clientY, "pointer");
      try {
        card.setPointerCapture(event.pointerId);
      } catch (error) {
        // Some Safari versions do not expose capture for all pointer types.
      }
      document.addEventListener("pointermove", movePointerDrag, { passive: false });
      document.addEventListener("pointerup", endPointerDrag, { passive: false });
      document.addEventListener("pointercancel", cancelPointerDrag, { passive: false });
    }

    function startTouchDrag(event) {
      if (event.touches.length !== 1) return;
      event.preventDefault();
      const touch = event.touches[0];
      beginDrag(event.currentTarget, touch.identifier, touch.clientX, touch.clientY, "touch");
      document.addEventListener("touchmove", moveTouchDrag, { passive: false });
      document.addEventListener("touchend", endTouchDrag, { passive: false });
      document.addEventListener("touchcancel", cancelPointerDrag, { passive: false });
    }

    function movePointerDrag(event) {
      if (!dragState) return;
      if (dragState.inputType !== "pointer" || event.pointerId !== dragState.pointerId) return;
      event.preventDefault();
      updateDragPosition(event.clientX, event.clientY);
    }

    function moveTouchDrag(event) {
      if (!dragState || dragState.inputType !== "touch") return;
      const touch = Array.from(event.touches).find((item) => item.identifier === dragState.pointerId);
      if (!touch) return;
      event.preventDefault();
      updateDragPosition(touch.clientX, touch.clientY);
    }

    function updateDragPosition(clientX, clientY) {
      if (!dragState) return;
      const distance = Math.hypot(clientX - dragState.startX, clientY - dragState.startY);
      if (!dragState.moved && distance > 8) {
        dragState.moved = true;
        dragState.clone = dragState.card.cloneNode(true);
        dragState.clone.classList.add("drag-clone");
        dragState.card.classList.add("drag-source");
        document.body.classList.add("dragging-touch");
        document.body.appendChild(dragState.clone);
      }

      if (dragState.clone) {
        dragState.clone.style.left = `${clientX}px`;
        dragState.clone.style.top = `${clientY}px`;
        setHoveredSlot(slotAtPoint(clientX, clientY));
      }
    }

    function endPointerDrag(event) {
      if (!dragState) return;
      if (dragState.inputType !== "pointer" || event.pointerId !== dragState.pointerId) return;
      event.preventDefault();
      finishDrag(event.clientX, event.clientY);
    }

    function endTouchDrag(event) {
      if (!dragState || dragState.inputType !== "touch") return;
      const touch = Array.from(event.changedTouches).find((item) => item.identifier === dragState.pointerId);
      if (!touch) {
        cancelPointerDrag();
        return;
      }
      event.preventDefault();
      finishDrag(touch.clientX, touch.clientY);
    }

    function finishDrag(clientX, clientY) {
      if (!dragState) return;
      const { cardId, moved } = dragState;
      const slot = moved ? slotAtPoint(clientX, clientY) : null;
      cleanupPointerDrag();

      if (!moved) {
        toggleSelected(cardId);
        return;
      }

      if (slot) {
        placeCard(cardId, slot.dataset.slot);
      } else {
        state.feedback = "Άφησε την κάρτα μέσα σε ένα πλαίσιο.";
        state.feedbackType = "";
        state.selectedCardId = null;
        render();
      }

    }

    function slotAtPoint(clientX, clientY) {
      const target = document.elementFromPoint(clientX, clientY);
      return target ? target.closest("[data-slot]") : null;
    }

    function setHoveredSlot(slot) {
      if (!dragState || dragState.activeSlot === slot) return;
      if (dragState.activeSlot) dragState.activeSlot.classList.remove("hovered");
      dragState.activeSlot = slot;
      if (dragState.activeSlot) dragState.activeSlot.classList.add("hovered");
    }

    function cancelPointerDrag() {
      cleanupPointerDrag();
      render();
    }

    function cleanupPointerDrag() {
      if (!dragState) return;
      if (dragState.activeSlot) dragState.activeSlot.classList.remove("hovered");
      dragState.card.classList.remove("drag-source");
      if (dragState.inputType === "pointer") {
        document.removeEventListener("pointermove", movePointerDrag);
        document.removeEventListener("pointerup", endPointerDrag);
        document.removeEventListener("pointercancel", cancelPointerDrag);
        try {
          dragState.card.releasePointerCapture(dragState.pointerId);
        } catch (error) {
          // Some browsers release capture automatically after pointerup.
        }
      } else {
        document.removeEventListener("touchmove", moveTouchDrag);
        document.removeEventListener("touchend", endTouchDrag);
        document.removeEventListener("touchcancel", cancelPointerDrag);
      }
      if (dragState.clone) dragState.clone.remove();
      document.body.classList.remove("dragging-touch");
      dragState = null;
    }

    if ("speechSynthesis" in window) {
      refreshVoices();
      window.speechSynthesis.onvoiceschanged = refreshVoices;
    }

    newSentence();
  </script>
